<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🦉 Typing Adventure!</title>
<style>
:root {
  --lp: #c084fc; --lr: #60a5fa; --lm: #4ade80; --li: #facc15;
  --ri: #fb923c; --rm: #2dd4bf; --rr: #f472b6; --rp: #a78bfa; --th: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Comic Sans MS', system-ui, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 33%, #e3f2fd 66%, #fff9c4 100%);
  background-size: 400% 400%;
  animation: bgShift 12s ease infinite;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px;
  overflow-x: hidden;
}
@keyframes bgShift {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

.screen {
  width: 100%;
  max-width: 860px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.hidden { display: none !important; }

/* ── CARD ── */
.card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 28px 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  width: 100%;
  text-align: center;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 32px;
  border-radius: 50px; border: none;
  font-size: 1.15rem; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.95) !important; }
.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  color: white;
  box-shadow: 0 4px 18px rgba(124,58,237,0.38);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(124,58,237,0.5); }
.btn-green {
  background: linear-gradient(135deg, #10b981, #0ea5e9);
  color: white;
  box-shadow: 0 4px 16px rgba(16,185,129,0.35);
}
.btn-green:hover { transform: translateY(-2px); }
.btn-gray { background: #e2e8f0; color: #475569; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── TITLE ── */
#title-heading {
  font-size: clamp(2.4rem, 7vw, 3.8rem);
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #ec4899, #f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1; margin-bottom: 6px;
}
.subtitle { font-size: 1.15rem; color: #64748b; margin-bottom: 22px; }

/* ── LEVEL GRID ── */
.level-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 22px;
}
.level-btn {
  aspect-ratio: 1; border-radius: 16px; border: 3px solid transparent;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  transition: transform 0.15s;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  padding: 6px 4px;
}
.level-btn.unlocked {
  background: linear-gradient(135deg, #fbbf24, #f97316);
  color: white;
  box-shadow: 0 4px 14px rgba(251,191,36,0.42);
}
.level-btn.unlocked:hover { transform: scale(1.08); }
.level-btn.locked { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
.level-btn .star-row { font-size: 0.68rem; letter-spacing: 1px; }

/* ── GAME HEADER ── */
#game-topbar {
  display: flex; align-items: center; gap: 10px; width: 100%;
}
.level-chip {
  font-size: 0.9rem; font-weight: 700; color: #7c3aed;
  background: #f3e8ff; padding: 6px 16px; border-radius: 20px;
  white-space: nowrap;
}

/* ── PROGRESS BUBBLES ── */
.bubbles { display: flex; gap: 5px; flex-wrap: wrap; }
.bubble {
  width: 26px; height: 26px; border-radius: 50%;
  background: #e2e8f0; border: 2px solid #cbd5e1;
  font-size: 0.75rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
}
.bubble.done {
  background: #22c55e; border-color: #16a34a; color: white;
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

/* ── MASCOT ── */
#mascot {
  font-size: 3.6rem; display: block; user-select: none;
  transition: transform 0.2s; flex-shrink: 0;
}
#mascot.happy { animation: mascotHappy 0.45s ease; }
#mascot.sad   { animation: mascotSad 0.4s ease; }
@keyframes mascotHappy {
  0%   { transform: scale(1) rotate(0); }
  40%  { transform: scale(1.3) rotate(12deg); }
  100% { transform: scale(1) rotate(0); }
}
@keyframes mascotSad {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-9px); }
  75%     { transform: translateX(9px); }
}

/* ── TARGET DISPLAY ── */
#target-display {
  font-size: clamp(2.4rem, 7vw, 4rem);
  font-weight: 900; letter-spacing: 5px;
  min-height: 72px;
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 2px;
  padding: 12px 16px;
}
#target-display.shake { animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-12px); }
  40%     { transform: translateX(12px); }
  60%     { transform: translateX(-9px); }
  80%     { transform: translateX(9px); }
}
.ch-typed   { color: #22c55e; }
.ch-current {
  color: #7c3aed; text-decoration: underline; text-underline-offset: 5px;
  animation: cursorBlink 0.8s ease infinite;
}
@keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.ch-pending { color: #94a3b8; }

/* ── HINT LINE ── */
#hint-line {
  font-size: 0.95rem; color: #64748b; font-style: italic; margin-top: -4px; min-height: 22px;
}

/* ── KEYBOARD ── */
#keyboard {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  width: 100%;
}
.key-row { display: flex; gap: 4px; }

.key {
  border-radius: 10px;
  font-size: 0.82rem; font-weight: 700; cursor: default; user-select: none;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(0,0,0,0.13);
  width: 50px; height: 46px;
  text-transform: uppercase;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 3px 0 rgba(0,0,0,0.14);
  position: relative;
}
.key.key-wide  { width: 66px; }
.key.key-space { width: 220px; height: 42px; font-size: 0.75rem; }

/* finger colors */
.key.lp { background: #f3e8ff; color: #6b21a8; border-color: #c084fc; }
.key.lr { background: #dbeafe; color: #1e40af; border-color: #60a5fa; }
.key.lm { background: #dcfce7; color: #15803d; border-color: #4ade80; }
.key.li { background: #fef9c3; color: #713f12; border-color: #facc15; }
.key.ri { background: #ffedd5; color: #7c2d12; border-color: #fb923c; }
.key.rm { background: #ccfbf1; color: #0f766e; border-color: #2dd4bf; }
.key.rr { background: #fce7f3; color: #9d174d; border-color: #f472b6; }
.key.rp { background: #ede9fe; color: #4c1d95; border-color: #a78bfa; }
.key.th { background: #f1f5f9; color: #475569; border-color: #94a3b8; }

.key.target {
  transform: scale(1.18) translateY(-5px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 3px white, 0 0 0 5px currentColor;
  animation: keyPulse 0.65s ease infinite alternate;
  z-index: 5; font-size: 0.95rem;
}
@keyframes keyPulse {
  from { box-shadow: 0 6px 20px rgba(0,0,0,0.22), 0 0 0 3px white, 0 0 0 5px currentColor; }
  to   { box-shadow: 0 8px 28px rgba(0,0,0,0.3),  0 0 0 3px white, 0 0 0 9px currentColor; }
}
.key.pressed {
  transform: translateY(2px) !important;
  box-shadow: 0 1px 0 rgba(0,0,0,0.14) !important;
  animation: none !important;
}

/* ── FINGER LEGEND ── */
.legend {
  display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; margin-top: 6px;
}
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: #64748b; }
.legend-dot  { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* ── PARTICLES ── */
.particle {
  position: fixed; pointer-events: none; font-size: 1.3rem; z-index: 9999;
  animation: particleFly 0.75s ease forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* ── COMPLETE SCREEN ── */
#complete-emoji { font-size: 3.2rem; margin-bottom: 6px; }
#complete-msg   { font-size: 1.6rem; font-weight: 800; color: #7c3aed; margin-bottom: 4px; }
#complete-stars {
  font-size: 3rem; margin: 12px 0;
  display: block;
  animation: starPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes starPop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
#complete-detail { color: #64748b; font-size: 1rem; margin-bottom: 22px; }

/* ── ERRORS BADGE ── */
#errors-badge {
  font-size: 0.88rem; color: #64748b;
}
#errors-badge span { color: #ef4444; font-weight: 700; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     TITLE SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-title" class="screen">
  <div class="card">
    <div id="title-heading">🦉 Typing Adventure!</div>
    <div class="subtitle">Learn to type, one key at a time!</div>
    <button class="btn btn-primary" onclick="startLevel(currentLevel)">▶ Let's Play!</button>
    <div class="level-grid" id="level-grid"></div>
  </div>
  <div style="color:#94a3b8;font-size:0.8rem;text-align:center">
    Click a level to jump right in!&nbsp; Progress is saved automatically.
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     GAME SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-game" class="screen hidden">

  <!-- top bar -->
  <div id="game-topbar">
    <button class="btn btn-gray" style="padding:7px 18px;font-size:0.88rem" onclick="goHome()">🏠 Home</button>
    <div class="level-chip" id="level-chip">Level 1</div>
    <div style="flex:1"></div>
    <div class="bubbles" id="bubbles"></div>
  </div>

  <!-- target + mascot -->
  <div class="card" style="padding:20px 24px">
    <div style="font-size:0.88rem;color:#7c3aed;font-weight:700;margin-bottom:6px" id="level-hint-title"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:18px">
      <span id="mascot">🦉</span>
      <div id="target-display"></div>
    </div>
    <div id="hint-line"></div>
  </div>

  <!-- keyboard -->
  <div class="card" style="padding:16px 20px">
    <div id="keyboard"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="errors-badge">Mistakes this level: <span id="err-count">0</span></div>
</div>

<!-- ═══════════════════════════════════════════════════
     LEVEL COMPLETE SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-complete" class="screen hidden">
  <div class="card">
    <div id="complete-emoji">🎉</div>
    <div id="complete-msg">Level Complete!</div>
    <div id="complete-stars"></div>
    <div id="complete-detail"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-next" onclick="nextLevel()">Next Level →</button>
      <button class="btn btn-green" onclick="replayLevel()">↩ Try Again</button>
      <button class="btn btn-gray"  onclick="goHome()">🏠 Home</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════

const FINGER_MAP = {
  q:'lp', a:'lp', z:'lp',
  w:'lr', s:'lr', x:'lr',
  e:'lm', d:'lm', c:'lm',
  r:'li', f:'li', v:'li', t:'li', g:'li', b:'li',
  y:'ri', h:'ri', n:'ri', u:'ri', j:'ri', m:'ri',
  i:'rm', k:'rm',
  o:'rr', l:'rr',
  p:'rp',
  ' ':'th',
};

const FINGER_INFO = {
  lp:{ label:'Left Pinky',   color:'#c084fc' },
  lr:{ label:'Left Ring',    color:'#60a5fa' },
  lm:{ label:'Left Middle',  color:'#4ade80' },
  li:{ label:'Left Index',   color:'#facc15' },
  ri:{ label:'Right Index',  color:'#fb923c' },
  rm:{ label:'Right Middle', color:'#2dd4bf' },
  rr:{ label:'Right Ring',   color:'#f472b6' },
  rp:{ label:'Right Pinky',  color:'#a78bfa' },
  th:{ label:'Thumbs',       color:'#94a3b8' },
};

// Keyboard layout rows
const KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['z','x','c','v','b','n','m'],
  [' '],
];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeLetterItems(pool, count = 16) {
  return Array.from({ length: count }, () => pool[Math.floor(Math.random() * pool.length)]);
}

const LEVELS = [
  {
    id: 1,
    title: 'Home Row — Left & Right',
    hint: '🏠 Rest your fingers: A S D F (left) and J K L (right)',
    pool: ['a','s','d','f','j','k','l'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 2,
    title: 'Complete the Home Row!',
    hint: '🖐 Stretch your index fingers inward to reach G and H',
    pool: ['a','s','d','f','g','h','j','k','l'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 3,
    title: 'Reach Up — E and I',
    hint: '☝️ Middle fingers reach up one row for E and I',
    pool: ['a','s','d','e','f','g','h','i','j','k','l'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 4,
    title: 'Ring Fingers Up — R and U',
    hint: '💍 Ring fingers reach up for R and U',
    pool: ['a','d','e','f','g','h','i','j','k','l','r','s','u'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 5,
    title: 'Center Top — T and Y',
    hint: '🎯 Stretch your index fingers up-center for T and Y',
    pool: ['a','d','e','f','g','h','i','j','k','l','r','s','t','u','y'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 6,
    title: 'Outer Top — O and W',
    hint: '🌊 Ring fingers handle O (right) and W (left) — above home',
    pool: ['a','d','e','f','g','h','i','j','k','l','o','r','s','t','u','w','y'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 7,
    title: 'Bottom Row — C, N, M',
    hint: '👇 Reach down to the bottom row for C, N, and M',
    pool: ['a','c','d','e','f','g','h','i','j','k','l','m','n','o','r','s','t','u','w','y'],
    type: 'letters',
    needed: 10,
  },
  {
    id: 8,
    title: 'All Letters!',
    hint: '🎊 Every letter is unlocked — you know them all!',
    pool: 'abcdefghijklmnopqrstuvwxyz'.split(''),
    type: 'letters',
    needed: 12,
  },
  {
    id: 9,
    title: 'Real Words!',
    hint: '📖 Type the whole word — each letter in order!',
    type: 'words',
    words: ['dog','cat','fun','run','ask','lid','jam','fox','big','cup','pen','win','zip',
            'bed','fit','hop','log','map','net','owl','hug','mud','sky','bay','gem'],
    needed: 10,
  },
  {
    id: 10,
    title: 'Full Sentences!',
    hint: '✏️ Type every word and press SPACE between them',
    type: 'sentences',
    sentences: [
      'the dog ran fast',
      'i like my cat',
      'she can run and jump',
      'the big red fox',
      'my owl is fun',
      'we can all win',
      'the cup is hot',
      'he got a new pen',
      'let us fly a kite',
      'the sun is big and bright',
    ],
    needed: 6,
  },
];

function levelItems(lv) {
  if (lv.type === 'letters') return makeLetterItems(lv.pool, 18);
  if (lv.type === 'words') { const w = shuffle([...lv.words]); return w.slice(0, 14); }
  if (lv.type === 'sentences') { const s = shuffle([...lv.sentences]); return s.slice(0, 8); }
  return [];
}

// ═══════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════

let progress = (() => {
  try { const r = localStorage.getItem('typingAdv_v2'); if (r) return JSON.parse(r); } catch(e) {}
  return { stars: {} };
})();

function saveProgress() {
  try { localStorage.setItem('typingAdv_v2', JSON.stringify(progress)); } catch(e) {}
}

function isUnlocked(idx) {
  return idx === 0 || (progress.stars[idx - 1] || 0) >= 1;
}

let currentLevel = (() => {
  for (let i = 0; i < LEVELS.length; i++) if (!progress.stars[i]) return i;
  return LEVELS.length - 1;
})();

// ═══════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur = 0.12, type = 'sine', vol = 0.18) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
const sndCorrect  = () => tone(523, 0.1,  'sine',     0.14);
const sndError    = () => tone(160, 0.15, 'sawtooth', 0.09);
const sndComplete = () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f,0.2,'sine',0.18), i*130)); };

// ═══════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════

function show(id) {
  ['screen-title','screen-game','screen-complete'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id)
  );
  if (id === 'screen-game') document.getElementById('keyboard').focus?.();
}

function goHome() {
  renderLevelGrid();
  show('screen-title');
}

// ═══════════════════════════════════════════════════
// TITLE
// ═══════════════════════════════════════════════════

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('button');
    const unlocked = isUnlocked(i);
    btn.className = 'level-btn ' + (unlocked ? 'unlocked' : 'locked');
    const s = progress.stars[i] || 0;
    btn.innerHTML = `<span>Lv ${i+1}</span><span class="star-row">${'⭐'.repeat(s)}${'☆'.repeat(3-s)}</span>`;
    btn.title = lv.title;
    if (unlocked) btn.onclick = () => startLevel(i);
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════

let G = {};   // game state

function startLevel(idx) {
  const lv = LEVELS[idx];
  G = {
    levelIdx:       idx,
    items:          levelItems(lv),
    itemIdx:        0,
    charIdx:        0,
    errors:         0,
    completedCount: 0,
  };
  currentLevel = idx;

  document.getElementById('level-chip').textContent   = `Level ${idx+1}: ${lv.title}`;
  document.getElementById('level-hint-title').textContent = lv.hint;
  document.getElementById('err-count').textContent    = '0';

  renderBubbles();
  renderTarget();
  renderKeyboard();
  renderLegend();
  show('screen-game');
}

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════

function renderBubbles() {
  const lv   = LEVELS[G.levelIdx];
  const cont = document.getElementById('bubbles');
  cont.innerHTML = '';
  for (let i = 0; i < lv.needed; i++) {
    const b = document.createElement('div');
    b.className = 'bubble' + (i < G.completedCount ? ' done' : '');
    b.textContent = i < G.completedCount ? '✓' : '';
    cont.appendChild(b);
  }
}

function curItem() { return G.items[G.itemIdx] || ''; }
function curChar() { return curItem()[G.charIdx] || ''; }

function renderTarget() {
  const el   = document.getElementById('target-display');
  const item = curItem();
  el.innerHTML = '';

  for (let i = 0; i < item.length; i++) {
    const span = document.createElement('span');
    const ch   = item[i] === ' ' ? '␣' : item[i];
    span.textContent = ch;
    span.className = i < G.charIdx ? 'ch-typed' : i === G.charIdx ? 'ch-current' : 'ch-pending';
    el.appendChild(span);
  }

  const hint = document.getElementById('hint-line');
  const tKey = curChar();
  if (tKey === ' ') {
    hint.textContent = '👇 Press the SPACE BAR with your thumb!';
  } else if (tKey) {
    const f = FINGER_MAP[tKey];
    hint.textContent = f ? `👆 Use your ${FINGER_INFO[f].label} for "${tKey.toUpperCase()}"` : '';
  } else {
    hint.textContent = '';
  }
}

function renderKeyboard() {
  const kb    = document.getElementById('keyboard');
  const tKey  = curChar();
  kb.innerHTML = '';

  KB_ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(k => {
      const el = document.createElement('div');
      const fc = FINGER_MAP[k] || 'th';
      let cls = `key ${fc}`;
      if (k === tKey)   cls += ' target';
      if (k === ' ')    cls += ' key-space';
      el.className = cls;
      el.textContent = k === ' ' ? 'SPACE' : k.toUpperCase();
      rowEl.appendChild(el);
    });
    kb.appendChild(rowEl);
  });
}

function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  Object.entries(FINGER_INFO).forEach(([key, val]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${val.color}"></div>${val.label}`;
    leg.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════
// KEYPRESS HANDLER
// ═══════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (document.getElementById('screen-game').classList.contains('hidden')) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  const key = e.key === ' ' ? ' ' : (e.key.length === 1 ? e.key.toLowerCase() : null);
  if (!key) return;
  e.preventDefault();

  const expected = curChar();
  if (!expected) return;

  flashKey(key);

  if (key === expected) {
    sndCorrect();
    burstParticles();
    triggerMascot('happy');
    G.charIdx++;

    if (G.charIdx >= curItem().length) {
      // item complete
      G.completedCount++;
      G.charIdx = 0;
      G.itemIdx++;
      renderBubbles();

      const lv = LEVELS[G.levelIdx];
      if (G.completedCount >= lv.needed) {
        setTimeout(completeLevel, 350);
        return;
      }

      if (G.itemIdx >= G.items.length) {
        G.items  = levelItems(lv);
        G.itemIdx = 0;
      }
    }

    renderTarget();
    renderKeyboard();
  } else {
    sndError();
    triggerMascot('sad');
    G.errors++;
    document.getElementById('err-count').textContent = G.errors;

    const disp = document.getElementById('target-display');
    disp.classList.remove('shake');
    void disp.offsetWidth;
    disp.classList.add('shake');
  }
});

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════

function flashKey(key) {
  document.querySelectorAll('.key').forEach(el => {
    const match = key === ' ' ? el.classList.contains('key-space')
                              : el.textContent.toLowerCase() === key;
    if (match) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 130);
    }
  });
}

function triggerMascot(mood) {
  const m = document.getElementById('mascot');
  m.classList.remove('happy','sad');
  void m.offsetWidth;
  m.classList.add(mood);
  m.textContent = mood === 'happy' ? '🦉' : '😬';
  setTimeout(() => { m.textContent = '🦉'; m.classList.remove('happy','sad'); }, 550);
}

function burstParticles() {
  const emojis = ['⭐','✨','🌟','💫','🎉'];
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * 90;
    p.style.setProperty('--dx', `${Math.cos(angle)*dist}px`);
    p.style.setProperty('--dy', `${Math.sin(angle)*dist - 55}px`);
    p.style.left = (window.innerWidth/2  + (Math.random()-0.5)*220) + 'px';
    p.style.top  = (window.innerHeight/2 + (Math.random()-0.5)*120) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ═══════════════════════════════════════════════════
// LEVEL COMPLETE
// ═══════════════════════════════════════════════════

function completeLevel() {
  const lv        = LEVELS[G.levelIdx];
  const totalKeys = G.items.slice(0, G.itemIdx).reduce((a,s)=>a+s.length,0) || 1;
  const errorRate = G.errors / Math.max(1, totalKeys + G.errors);

  let stars = 1;
  if      (G.errors === 0)    stars = 3;
  else if (errorRate < 0.10)  stars = 2;

  const prev = progress.stars[G.levelIdx] || 0;
  if (stars > prev) { progress.stars[G.levelIdx] = stars; saveProgress(); }

  sndComplete();

  // complete screen
  const msgs = ['Amazing! 🎉','Fantastic! 🌟','You Rock! 🦉','Superstar! ✨','Awesome! 🏆'];
  document.getElementById('complete-emoji').textContent = stars === 3 ? '🏆' : '🎉';
  document.getElementById('complete-msg').textContent   = msgs[Math.floor(Math.random()*msgs.length)];

  const starEl = document.getElementById('complete-stars');
  starEl.textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  starEl.style.animation = 'none';
  void starEl.offsetWidth;
  starEl.style.animation = '';

  document.getElementById('complete-detail').textContent =
    G.errors === 0
      ? '🎯 Perfect — zero mistakes! Incredible!'
      : `${G.errors} mistake${G.errors===1?'':'s'} · ${stars} star${stars===1?'':'s'} earned`;

  const hasNext = G.levelIdx + 1 < LEVELS.length && isUnlocked(G.levelIdx + 1);
  const btnNext = document.getElementById('btn-next');
  if (hasNext) {
    btnNext.style.display = '';
    btnNext.textContent = `Next Level (${G.levelIdx+2}) →`;
  } else if (G.levelIdx + 1 < LEVELS.length) {
    btnNext.style.display = '';
    btnNext.textContent = `Unlock Level ${G.levelIdx+2}! 🔓`;
  } else {
    btnNext.style.display = 'none';
    document.getElementById('complete-msg').textContent = '🏆 You finished ALL 10 levels!';
  }

  show('screen-complete');
}

function nextLevel() {
  const next = G.levelIdx + 1;
  if (next < LEVELS.length) startLevel(next);
  else goHome();
}

function replayLevel() { startLevel(G.levelIdx); }

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════

renderLevelGrid();
show('screen-title');
</script>
