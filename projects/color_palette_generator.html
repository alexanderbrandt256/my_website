
<style>
  #pg-wrap { padding: 1rem; position: relative; min-height: 540px; font-family: var(--font-sans); }
  #pg-tabs::-webkit-scrollbar { display: none; }
  .pg-tab { white-space: nowrap; font-size: 12px; padding: 6px 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: none; color: var(--color-text-secondary); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .pg-tab.active { border-color: var(--color-border-primary); background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  .pg-swatch { flex: 1; cursor: pointer; transition: flex 0.25s ease; position: relative; overflow: hidden; }
  .pg-swatch:hover { flex: 1.6; }
  .pg-swatch .hex-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 4px; font-family: var(--font-mono); font-size: 9px; text-align: center; text-transform: uppercase; opacity: 0; transition: opacity 0.2s; letter-spacing: 0.03em; background: linear-gradient(transparent, rgba(0,0,0,0.25)); }
  .pg-swatch:hover .hex-label, .pg-swatch.touched .hex-label { opacity: 1; }
  #pg-toast { position: absolute; bottom: 0.75rem; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 99px; padding: 7px 18px; font-size: 13px; color: var(--color-text-primary); opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; pointer-events: none; white-space: nowrap; }
  #pg-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #pg-hex-input { flex: 1; font-family: var(--font-mono); font-size: 15px; text-transform: uppercase; background: none; border: none; color: var(--color-text-primary); outline: none; letter-spacing: 0.04em; min-width: 0; }
  .pg-color-dot { width: 36px; height: 36px; border-radius: 50%; position: relative; cursor: pointer; flex-shrink: 0; border: none; overflow: hidden; }
  .pg-color-dot input[type=color] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; padding: 0; }
  #pg-shuffle { background: none; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 7px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); transition: background 0.15s; }
  #pg-shuffle:hover { background: var(--color-background-secondary); }
  #pg-copy-base { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 4px 6px; line-height: 1; }
</style>

<h2 class="sr-only">Color palette generator — pick a base color to explore 5-color harmonies</h2>

<div id="pg-wrap">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
    <span style="font-size: 16px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.01em;">palette</span>
    <button id="pg-shuffle" aria-label="Shuffle to a random color">
      <i class="ti ti-refresh" aria-hidden="true" style="font-size: 15px;"></i> shuffle
    </button>
  </div>

  <div style="display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 8px 12px; margin-bottom: 1.25rem; border: 0.5px solid var(--color-border-tertiary);">
    <div class="pg-color-dot" id="pg-dot">
      <input type="color" id="pg-picker" value="#6B6EF0" aria-label="Pick a base color" />
    </div>
    <input id="pg-hex-input" type="text" value="#6B6EF0" maxlength="7" aria-label="Hex color value" spellcheck="false" />
    <button id="pg-copy-base" aria-label="Copy base hex code" title="Copy base color">
      <i class="ti ti-copy" style="font-size: 18px;" aria-hidden="true"></i>
    </button>
  </div>

  <div id="pg-tabs" role="tablist" style="display: flex; gap: 5px; margin-bottom: 1rem; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 2px;"></div>

  <div id="pg-swatches" style="display: flex; height: 200px; border-radius: var(--border-radius-lg); overflow: hidden; gap: 3px; margin-bottom: 8px;"></div>

  <div id="pg-hex-row" style="display: flex; gap: 3px; margin-bottom: 1.5rem;"></div>

  <div id="pg-toast"></div>
</div>

<script>
(function() {
  const HARMONIES = ['Complementary', 'Analogous', 'Triadic', 'Tetradic', 'Monochromatic'];
  let current = 0;
  let baseHex = '#6B6EF0';

  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
    let h, s, l = (mx+mn)/2;
    if (mx===mn) { h=s=0; } else {
      const d = mx-mn;
      s = l>0.5 ? d/(2-mx-mn) : d/(mx+mn);
      switch(mx){
        case r: h=((g-b)/d+(g<b?6:0))/6; break;
        case g: h=((b-r)/d+2)/6; break;
        default: h=((r-g)/d+4)/6;
      }
    }
    return [h*360, s*100, l*100];
  }

  function hslToHex(h,s,l) {
    h=((h%360)+360)%360; s=Math.max(0,Math.min(100,s)); l=Math.max(0,Math.min(100,l));
    s/=100; l/=100;
    const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
    let r,g,b;
    if(h<60)[r,g,b]=[c,x,0];
    else if(h<120)[r,g,b]=[x,c,0];
    else if(h<180)[r,g,b]=[0,c,x];
    else if(h<240)[r,g,b]=[0,x,c];
    else if(h<300)[r,g,b]=[x,0,c];
    else [r,g,b]=[c,0,x];
    const h2 = v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
    return '#'+h2(r)+h2(g)+h2(b);
  }

  function getHarmony(hex, type) {
    let [h,s,l] = hexToHsl(hex);
    const sv = v => Math.min(100, Math.max(10, v));
    const lv = v => Math.min(92, Math.max(10, v));
    switch(type) {
      case 'Complementary': return [
        hslToHex(h,s,l),
        hslToHex(h+180,s,l),
        hslToHex(h,sv(s*0.7),lv(l+22)),
        hslToHex(h+180,sv(s*0.9),lv(l-18)),
        hslToHex(h,sv(s*1.1),lv(l-22)),
      ];
      case 'Analogous': return [
        hslToHex(h-30,s,l),
        hslToHex(h-15,sv(s*1.05),l),
        hslToHex(h,s,l),
        hslToHex(h+15,sv(s*1.05),l),
        hslToHex(h+30,s,l),
      ];
      case 'Triadic': return [
        hslToHex(h,s,l),
        hslToHex(h+120,s,l),
        hslToHex(h+240,s,l),
        hslToHex(h+60,sv(s*0.75),lv(l+15)),
        hslToHex(h+180,sv(s*0.75),lv(l-15)),
      ];
      case 'Tetradic': return [
        hslToHex(h,s,l),
        hslToHex(h+90,s,l),
        hslToHex(h+180,s,l),
        hslToHex(h+270,s,l),
        hslToHex(h+45,sv(s*0.75),lv(l+15)),
      ];
      case 'Monochromatic': return [
        hslToHex(h,sv(s*0.6),lv(l+38)),
        hslToHex(h,sv(s*0.8),lv(l+18)),
        hslToHex(h,s,l),
        hslToHex(h,sv(s*1.1),lv(l-18)),
        hslToHex(h,sv(s*1.15),lv(l-36)),
      ];
    }
  }

  function luma(hex) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (0.299*r+0.587*g+0.114*b)/255;
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('pg-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function copyHex(hex) {
    const upper = hex.toUpperCase();
    navigator.clipboard.writeText(upper).catch(()=>{}).finally(() => showToast(upper + ' copied'));
  }

  function renderTabs() {
    document.getElementById('pg-tabs').innerHTML = HARMONIES.map((h,i) =>
      `<button class="pg-tab${i===current?' active':''}" role="tab" aria-selected="${i===current}" onclick="window._pgSelect(${i})">${h}</button>`
    ).join('');
  }

  function renderSwatches() {
    const colors = getHarmony(baseHex, HARMONIES[current]);
    document.getElementById('pg-swatches').innerHTML = colors.map(c => {
      const fg = luma(c) > 0.55 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
      return `<div class="pg-swatch" style="background:${c}" onclick="window._pgCopy('${c}')" title="Copy ${c.toUpperCase()}" ontouchstart="this.classList.add('touched')" ontouchend="this.classList.remove('touched')">
        <div class="hex-label" style="color:${fg}">${c.toUpperCase()}</div>
      </div>`;
    }).join('');
    document.getElementById('pg-hex-row').innerHTML = colors.map(c =>
      `<div style="flex:1;text-align:center;"><span style="font-family:var(--font-mono);font-size:9px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.02em;">${c.toUpperCase()}</span></div>`
    ).join('');
  }

  function updateColor(hex) {
    if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
    baseHex = hex.toUpperCase();
    document.getElementById('pg-picker').value = hex;
    document.getElementById('pg-hex-input').value = baseHex;
    document.getElementById('pg-dot').style.background = hex;
    renderSwatches();
  }

  window._pgSelect = function(i) { current = i; renderTabs(); renderSwatches(); };
  window._pgCopy = copyHex;

  const SHUFFLE_HUES = [10,22,38,52,80,160,185,205,220,250,270,290,320,340];
  document.getElementById('pg-shuffle').addEventListener('click', () => {
    const h = SHUFFLE_HUES[Math.floor(Math.random()*SHUFFLE_HUES.length)];
    const s = 52 + Math.floor(Math.random()*38);
    const l = 38 + Math.floor(Math.random()*28);
    updateColor(hslToHex(h,s,l));
  });

  document.getElementById('pg-picker').addEventListener('input', e => updateColor(e.target.value));

  document.getElementById('pg-hex-input').addEventListener('input', e => {
    let v = e.target.value.trim();
    if (!v.startsWith('#')) v = '#'+v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) updateColor(v);
  });

  document.getElementById('pg-copy-base').addEventListener('click', () => copyHex(baseHex));

  updateColor(baseHex);
  renderTabs();
  renderSwatches();
})();
</script>
